<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المعاينة التفاعلية | United Expertise</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{margin:0;font-family:system-ui,sans-serif;background-color:#08080f;color:#fff;overflow:hidden}
        
        /* تصميم عارض النماذج للكمبيوتر والمتصفحات */
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #08080f;
        }

        .interface-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .card {
            background: rgba(26, 26, 48, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-ar {
            display: none; /* يظهر فقط في الهواتف عبر الجافا سكريبت */
            background: linear-gradient(135deg, #1a73e8, #34a853);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .desktop-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="scene.glb" 
        ios-src="scene.usdz"
        ar 
        ar-modes="scene-viewer quick-look webxr" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        alt="A 3D model">
        
        <div class="interface-overlay">
            <div class="card">
                <h2 style="margin-bottom:10px; font-size:1.1rem;">المعاينة التفاعلية 3D</h2>
                
                <button id="android-ar-btn" class="btn-ar" onclick="launchAndroidAR()">🤖 عرض في واقعك (Android)</button>
                
                <div id="desktop-msg" class="desktop-info">
                    استخدم الفأرة لتدوير المجسم. افتح الرابط من الهاتف لتجربة الواقع المعزز.
                </div>
            </div>
        </div>
    </model-viewer>

    <script>
        const ua = navigator.userAgent;
        const isAndroid = /android/i.test(ua);
        const isIOS = /iphone|ipad|ipod/i.test(ua);

        // إظهار الزر المناسب بناءً على نوع الجهاز
        if (isAndroid) {
            document.getElementById('android-ar-btn').style.display = 'block';
            document.getElementById('desktop-msg').style.display = 'none';
        }

        // دالة تشغيل الأندرويد المستقلة تماماً عن أي IP
        function launchAndroidAR() {
            // جلب رابط الملف الحقيقي من الإنترنت تلقائياً بناءً على موقع الملف الحالي
            const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const glbUrl = encodeURIComponent(currentPath + "scene.glb");
            
            const intent =
                "intent://arvr.google.com/scene-viewer/1.0" +
                "?file=" + glbUrl +
                "&mode=ar_preferred" +
                "&title=Scene" +
                "#Intent;" +
                "scheme=https;" +
                "package=com.google.android.googlequicksearchbox;" +
                "action=android.intent.action.VIEW;" +
                "S.browser_fallback_url=https://developers.google.com/ar;" +
                "end;";

            window.location = intent;
        }
    </script>
</body>
</html>
